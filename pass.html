<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="pass.css">
</head>

<body>
    <div class="container">
        <h1>Password Generator</h1>

        <div class="inputbox">
            <input type="text" class="pass" disabled id="pass">
            <i class="fa-regular fa-copy" id="icon"></i>
        </div>

        <input type="range" min="1" max="30" value="8" id="slider">

        <div class="row">
            <p>Password Length</p>
            <span id="value"></span>
        </div>

        <div class="row">
            <label for="lowercase">Iclude Lowercase Letters (a-z)</label>
            <input type="checkbox" name="lowercase"  checked id="lowercase">
        </div>

        <div class="row">
            <label for="uppercase">Iclude Uppercase Letters (A-Z)</label>
            <input type="checkbox" name="uppercase" checked id="uppercase">
        </div>

        <div class="row">
            <label for="numbers">Iclude Numbers (0-9)</label>
            <input type="checkbox" name="numbers" checked id="numbers">
        </div>

        <div class="row">
            <label for="symbols">Iclude Symbols (@-*)</label>
            <input type="checkbox" name="symbols" checked id="symbols">
        </div>

        <button type="button" id="btn" class="gen">Generate Password</button>
    </div>

    <script src="pass.js"></script>
</body>

</html>
