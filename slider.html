<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Using Html Css, Js</title>
    <link rel="stylesheet" href="slider.css">
</head>

<body>

    <div class="slider">
        <div class="slides">
            <img src="images/aston-martin.jpg" class="slide" alt="This is an image">
            <img src="images/audi-rs-e-tron-gt.jpg" alt="This is an image" class="slide">
            <img src="images/maserati-mc20.jpg" class="slide" alt="This is an image">
            <img src="images/nio-et5.jpg" class="slide" alt="This is an image">
        </div>
        <button class="prev" onclick="prevSlide()">&#10094</button>
        <button class="next" onclick="nextSlide()">&#10095</button>
    </div>


    <script src="slider.js"></script>

</body>

</html>
